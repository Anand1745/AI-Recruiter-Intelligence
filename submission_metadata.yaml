# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Windows 11 Laptop"                    # Or: "AWS EC2 c5.4xlarge", "Local Linux box", etc.
  cpu_cores: 16                                  # Number of CPU cores used
  ram_gb: 24                                    # Available RAM in GB
  python_version: "3.11.4"                      # python --version
  os: "Windows 11"                              # Or "Ubuntu 22.04 LTS", etc.
  uses_gpu_for_inference: false                 # Must be false — see compute constraints
  has_network_during_ranking: false             # Must be false — no API calls during ranking
  pre_computation_required: True               # true if you pre-compute embeddings or train models offline
  pre_computation_time_minutes: 8               # Approximate, if applicable

# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest. Stage 5 interview
# may verify these declarations against your code; declarations that contradict
# your code or your interview are flagged.
ai_tools_used:
  - "ChatGPT"

ai_usage_summary: |
  ChatGPT was used as an engineering assistant for architecture discussions,
  debugging, code reviews, documentation, and UI refinement. The complete
  ranking pipeline, scoring logic, benchmarking, transferable skill engine,
  recruiter intelligence modules, and final verification were implemented,
  tested, and validated manually. No online LLM APIs are used during inference
  or candidate ranking.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  AI Recruiter Intelligence is a CPU-only recruiter ranking system that ranks
  100,000 candidates using semantic resume embeddings together with recruiter-
  oriented intelligence modules. Candidate ranking combines semantic similarity,
  direct skill matching, transferable skill intelligence, experience validation,
  production AI experience detection, recruiter engagement behaviour, and
  profile consistency scoring. The system generates explainable recommendations,
  recruiter reasoning, dashboard analytics, benchmarking, and ranked submission
  files. Candidate embeddings and runtime caches are precomputed offline,
  allowing inference to complete in approximately 7 seconds for 100,000
  candidates while using approximately 1.3 GB RAM.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: false        # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true         # I have tested that my reproduce_command runs end-to-end
